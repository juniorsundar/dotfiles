# Unbind the default split window keybindings
unbind %
unbind '"'

# Bind new keybindings for splitting windows
bind | split-window -h
bind _ split-window -v
bind r source-file ~/.tmux.conf
bind + resize-pane -Z
bind-key o split-window -h -p 30 "pi"

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# set 256 color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color*:Tc"
# set-option -g default-shell /usr/bin/zsh

set -g extended-keys on
set -g extended-keys-format csi-u
set -s set-clipboard on
set -s copy-command ''

unbind-key -T copy-mode-vi !
unbind-key -T copy-mode-vi D
unbind-key -T copy-mode-vi Y
unbind-key -T copy-mode-vi y
unbind-key -T copy-mode-vi MouseDragEnd1Pane
unbind-key -T copy-mode-vi DoubleClick1Pane
unbind-key -T copy-mode-vi TripleClick1Pane
unbind-key -T copy-mode-vi M-y
unbind-key -T copy-mode-vi C-j

bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

bind-key B run-shell '
  base="#{session_name}";
  group="${base}-view-#{pane_id}";
  tmux set-option -p @return-window "#{session_name}:#{window_id}";
  tmux set-option -p @view-session "$group";
  tmux break-pane -d -n "detached-#{pane_id}";
  tmux new-session -d -t "$base" -s "$group" 2>/dev/null || true;
  cmd="tmux attach -t $group";
  socket="${KITTY_LISTEN_ON#unix:}";
  [ -z "$socket" ] && socket=$(ls /tmp/kitty-* 2>/dev/null | head -1);
  [ -n "$socket" ] && kitty @ --to "unix:$socket" launch --location=hsplit --type=window sh -c "$cmd" >/dev/null 2>&1 || true
'

bind-key V run-shell '
  target="$(tmux show-option -p -v @return-window 2>/dev/null)";
  group="$(tmux show-option -p -v @view-session 2>/dev/null)";
  if [ -n "$target" ]; then
    tmux join-pane -h -t "$target";
    [ -n "$group" ] && tmux kill-session -t "$group" 2>/dev/null;
    tmux set-option -p -u @return-window 2>/dev/null;
    tmux set-option -p -u @view-session 2>/dev/null;
  else
    tmux display-message "No detached pane. Use prefix-B first to detach a pane."
  fi
'

bind-key S run-shell '
  target="$(tmux show-option -p -v @return-window 2>/dev/null)";
  group="$(tmux show-option -p -v @view-session 2>/dev/null)";
  if [ -n "$target" ]; then
    tmux join-pane -v -t "$target";
    [ -n "$group" ] && tmux kill-session -t "$group" 2>/dev/null;
    tmux set-option -p -u @return-window 2>/dev/null;
    tmux set-option -p -u @view-session 2>/dev/null;
  else
    tmux display-message "No detached pane. Use prefix-B first to detach a pane."
  fi
'

bind-key K run-shell '
  group="$(tmux show-option -p -v @view-session)";
  [ -n "$group" ] && tmux kill-session -t "$group" 2>/dev/null || true
'

bind-key -T copy-mode-vi Y send-keys -X copy-line
bind-key -T copy-mode-vi D send-keys -X copy-end-of-line
set -g mouse on
set -g allow-passthrough on
set-option -sg escape-time 10
set-option -g focus-events on

set-option -g status-position top

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

set-option -g message-command-style 'bg=#282c34,fg=#bbc2cf'
set-option -g message-style 'bg=#282c34,fg=#bbc2cf'
set-option -g mode-style 'bg=#424856'
set-option -g status-justify right
set-option -g status-left '  #{=200:session_name}  '
set-option -g status-left-length 500
set-option -g status-left-style 'bold'
set-option -g status-right ''
set-option -g status-style 'bg=default,fg=#bbc2cf'
set-option -g window-status-current-format ' #I | #W '
set-option -g window-status-current-style 'bg=#51afef,fg=#282c34'
set-option -g window-status-format ' #I | #W '
set-option -g window-status-separator ' '
set-option -g window-status-style ''
set -g status on
set -g pane-border-status top
set -g pane-border-format ""
set -g pane-border-style fg="#5b6268",bg=default
set -g pane-active-border-style fg="#5b6268",bg=default

run '~/.tmux/plugins/tpm/tpm'
